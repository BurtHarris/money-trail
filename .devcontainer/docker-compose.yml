name: money-trail-dev

x-workspace-volumes: &workspace-volumes
  - ../:/workspaces/money-trail:cached
  - money-trail-uv-cache:/home/vscode/.cache/uv
  - /var/run/docker.sock:/var/run/docker.sock

services:
  workspace:
    build:
      dockerfile: .devcontainer/Dockerfile
      context: ..
    volumes: *workspace-volumes
    command: sleep infinity
    environment:
      AIRFLOW_HOME: /workspaces/money-trail/.airflow
      AIRFLOW__CORE__DAGS_FOLDER: /workspaces/money-trail/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////workspaces/money-trail/.airflow/airflow.db
      DBT_PROFILES_DIR: /workspaces/money-trail/dbt
      BOOTSTRAP_AIRFLOW: "0"

volumes:
  money-trail-uv-cache:
