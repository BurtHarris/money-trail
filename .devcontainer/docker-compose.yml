version: "3.9"

services:
  devcontainer:
  
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces/money-trail:cached
      - /home/burth/.config/gh:/home/vscode/.config/gh:ro
    command: sleep infinity
    depends_on:
      - postgres
    environment:
      COMPOSE_PROGRESS: plain

  postgres:
    image: postgres:15
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    ports:
      - "5432:5432"

volumes:
  postgres-data: