version: '3.8'

services:
  devcontainer:
    build:
      context: ..
      dockerfile: Dockerfile
    command: /bin/bash -c "bash scripts/start_airflow.sh; sleep infinity"
    init: true
    volumes:
      - ..:/workspaces/money-trail:cached
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16.3-alpine
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 2s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres-data:
