name: CI

on:
  push:
    branches:
      - main
      - re-architecture
      - 'docs/**'
  pull_request:
    branches:
      - main
      - re-architecture

jobs:
  dbt-smoke-check:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: dbt parse
        run: |
          cd dbt
          dbt parse --profiles-dir . --project-dir .
      
      - name: dbt compile
        run: |
          cd dbt
          dbt compile --profiles-dir . --project-dir . || dbt debug --profiles-dir . --project-dir .
