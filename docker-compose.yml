name: money-trail

x-airflow-env: &airflow-env
  AIRFLOW_HOME: /app
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"

x-airflow-volumes: &airflow-volumes
  - ./dags:/app/dags
  - ./dbt:/app/dbt
  - ./data:/app/data
  - ./logs:/app/logs
  - ./scripts:/app/scripts

services:
  postgres:
    image: postgres:16
    container_name: money-trail-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  init-airflow:
    build: .
    container_name: money-trail-init
    environment:
      <<: *airflow-env
    volumes: *airflow-volumes
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username devadmin --password devadmin --firstname Dev --lastname Admin --role Admin --email admin@localhost || true
      "
    depends_on:
      postgres:
        condition: service_healthy

  airflow:
    build: .
    container_name: money-trail-airflow
    ports:
      - "8080:8080"
    environment:
      <<: *airflow-env
      AIRFLOW_ADMIN_USERNAME: devadmin
      AIRFLOW_ADMIN_PASSWORD: devadmin
      AIRFLOW_ADMIN_EMAIL: admin@localhost
      AIRFLOW_ADMIN_FIRSTNAME: Dev
      AIRFLOW_ADMIN_LASTNAME: Admin
    volumes: *airflow-volumes
    develop:
      watch:
        - path: ./dags
          action: sync
          target: /app/dags
        - path: ./dbt
          action: sync
          target: /app/dbt
        - path: ./scripts
          action: sync
          target: /app/scripts
    depends_on:
      postgres:
        condition: service_healthy
      init-airflow:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  scheduler:
    build: .
    container_name: money-trail-scheduler
    environment:
      <<: *airflow-env
    volumes: *airflow-volumes
    develop:
      watch:
        - path: ./dags
          action: sync
          target: /app/dags
        - path: ./scripts
          action: sync
          target: /app/scripts
    command: airflow scheduler
    depends_on:
      postgres:
        condition: service_healthy
      init-airflow:
        condition: service_completed_successfully

volumes:
  postgres-data:
