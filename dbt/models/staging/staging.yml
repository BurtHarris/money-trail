      - name: transaction_dt
        description: "Transaction date"
        tests:
          - not_null
      - name: transaction_amt
        description: "Transaction amount"
        tests:
          - not_null
      - name: zip_code
        description: "ZIP code (normalized to 5 digits)"
        tests:
          - dbt_utils.expression_is_true:
              expression: "length(zip_code) <= 5 or zip_code is null"
      - name: cycle
        description: "Election cycle"
        tests:
          - not_null

  - name: stg_pas2
    description: "Contributions to candidates staging model"
    columns:
      - name: cmte_id
        description: "Committee ID"
        tests:
          - not_null
      - name: tran_id
        description: "Transaction ID"
        tests:
          - not_null
      - name: cand_id
        description: "Candidate ID"
        tests:
          - not_null
      - name: transaction_dt
        description: "Transaction date"
        tests:
          - not_null
      - name: transaction_amt
        description: "Transaction amount"
        tests:
          - not_null
      - name: zip_code
        description: "ZIP code (normalized to 5 digits)"
